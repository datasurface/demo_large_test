name: Pull Request Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Minimal permissions — write only to post PR comments; all other access is read-only.
permissions:
  contents: read
  pull-requests: write

jobs:
  datasurface-pr-validator:
    name: DataSurface PR Validator
    runs-on: ubuntu-latest

    steps:
    # The PR code is checked out at a pinned SHA and run exclusively inside a
    # Docker container, limiting the blast radius of any untrusted content.
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.sha }}
        path: pr

    - name: Checkout main branch code
      uses: actions/checkout@v4
      with:
        ref: 'main'
        path: main

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: datasurface
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Run check script in Docker container
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/main:/workspace/main \
          -v ${{ github.workspace }}/pr:/workspace/pr \
          -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
          -e BASE_REPOSITORY="${{ github.repository }}" \
          -e HEAD_REPOSITORY="${{ github.event.pull_request.head.repo.full_name }}" \
          -e HEAD_BRANCH="${{ github.event.pull_request.head.ref }}" \
          datasurface/datasurface:latest \
          python -m datasurface.handler.action /workspace/main /workspace/pr
